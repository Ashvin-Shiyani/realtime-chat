<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiveChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6ab0;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --join: #6affb0;
      --leave: #ff6a6a;
      --radius: 16px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(255,106,176,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: var(--bg);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 0 80px rgba(124,106,255,0.12);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .login-sub {
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'DM Mono', monospace;
      margin-bottom: 36px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
    }

    .login-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
    }

    .login-card button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .login-card button:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-card button:active { transform: translateY(0); }

    /* ── MAIN APP ── */
    #app {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    #app.visible { display: flex; }

    .chat-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 60px 1fr 72px;
      width: 100%;
      height: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      gap: 12px;
    }

    /* ── HEADER ── */
    .chat-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-logo {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: auto;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--join);
      box-shadow: 0 0 8px var(--join);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 0.65rem;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.15s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .user-item:hover { background: var(--surface2); }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    /* ── MESSAGES ── */
    .messages-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      animation: msgIn 0.25s cubic-bezier(0.22,1,0.36,1);
      max-width: 75%;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.mine { align-self: flex-end; align-items: flex-end; }
    .msg.theirs { align-self: flex-start; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      padding: 0 4px;
    }

    .msg.mine .msg-meta { flex-direction: row-reverse; }

    .msg-username { font-weight: 600; }

    .msg-bubble {
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.mine .msg-bubble {
      background: linear-gradient(135deg, var(--accent), #9b8aff);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.theirs .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .system-msg {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 4px;
      animation: msgIn 0.3s ease;
    }

    .system-msg.join { color: var(--join); }
    .system-msg.leave { color: var(--leave); }

    /* ── TYPING INDICATOR ── */
    #typing-indicator {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      height: 18px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      grid-column: 2;
    }

    .typing-dots span {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* ── INPUT AREA ── */
    .input-area {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #msg-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.12);
    }

    #send-btn {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover { opacity: 0.9; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.97); }
    #send-btn svg { width: 20px; height: 20px; fill: white; }

    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">LiveChat</div>
    <div class="login-sub">// real-time messaging</div>
    <input id="username-input" type="text" placeholder="Enter your username..." maxlength="20" />
    <p id="login-error" style="color:#ff6a6a; font-size:0.8rem; margin-top:10px; font-family:'DM Mono',monospace;"></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="chat-layout">
    <div class="chat-header">
      <div class="header-logo">LiveChat</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span id="online-count">0 online</span>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-title">Online</div>
      <div id="user-list"></div>
    </div>

    <div class="messages-container" id="messages"></div>

    <div id="typing-indicator"></div>

    <div class="input-area">
      <input id="msg-input" type="text" placeholder="Type a message..." maxlength="500" autocomplete="off" />
      <button id="send-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const socket = io();
  let myUsername = '';
  let mySocketId = '';
  let typingTimer;

  const avatarColors = [
    ['#7c6aff','#5548cc'], ['#ff6ab0','#cc4488'], ['#6affb0','#44cc88'],
    ['#ffb06a','#cc8844'], ['#6ab0ff','#4488cc'], ['#ff6a6a','#cc4444'],
  ];

  function getColor(name) {
    let hash = 0;
    for (let c of name) hash = c.charCodeAt(0) + hash * 31;
    return avatarColors[Math.abs(hash) % avatarColors.length];
  }

  // LOGIN
  document.getElementById('join-btn').addEventListener('click', joinChat);
  document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });

function joinChat() {
    const input = document.getElementById('username-input');
    const name = input.value.trim();
    const error = document.getElementById('login-error');

    if (!name) {
      error.textContent = 'Username cannot be empty!';
      return;
    }
    if (name.length < 3) {
      error.textContent = 'Username must be at least 3 characters!';
      return;
    }
    if (!/^[a-zA-Z0-9_]+$/.test(name)) {
      error.textContent = 'Only letters, numbers and underscores allowed!';
      return;
    }

    error.textContent = '';
    myUsername = name;
    socket.emit('join', name);
  }

  // MESSAGES
  socket.on('message', (data) => {
    const isMine = data.socketId === mySocketId;
    const colors = getColor(data.username);
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
    div.innerHTML = `
      <div class="msg-meta">
        <span class="msg-username" style="color:${colors[0]}">${isMine ? 'You' : data.username}</span>
        <span>${data.time}</span>
      </div>
      <div class="msg-bubble">${escapeHTML(data.text)}</div>
    `;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });

  socket.on('system', ({ message, type }) => {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `system-msg ${type}`;
    div.textContent = message;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });

  // USER LIST
  socket.on('userList', (users) => {
    document.getElementById('online-count').textContent = `${users.length} online`;
    const list = document.getElementById('user-list');
    list.innerHTML = '';
    users.forEach(u => {
      const [bg] = getColor(u);
      const div = document.createElement('div');
      div.className = 'user-item';
      div.innerHTML = `
        <div class="user-avatar" style="background:${bg}22;color:${bg}">
          ${u[0].toUpperCase()}
        </div>
        <span>${escapeHTML(u)}</span>
      `;
      list.appendChild(div);
    });
  });

  // TYPING
  let typingUsers = {};

  socket.on('typing', ({ username, isTyping }) => {
    if (isTyping) typingUsers[username] = true;
    else delete typingUsers[username];
    updateTyping();
  });

  function updateTyping() {
    const names = Object.keys(typingUsers);
    const el = document.getElementById('typing-indicator');
    if (names.length === 0) { el.innerHTML = ''; return; }
    const label = names.length === 1 ? `${names[0]} is typing` : `${names.join(', ')} are typing`;
    el.innerHTML = `${label} <span class="typing-dots"><span></span><span></span><span></span></span>`;
  }

  // SEND
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('message', { text });
    socket.emit('typing', false);
    input.value = '';
    clearTimeout(typingTimer);
  }

  document.getElementById('send-btn').addEventListener('click', sendMessage);

  document.getElementById('msg-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { sendMessage(); return; }
    socket.emit('typing', true);
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => socket.emit('typing', false), 2000);
  });

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
